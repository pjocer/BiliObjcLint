# BiliObjCLint 默认配置
# 复制此文件到项目根目录并重命名为 .biliobjclint.yaml

# ==================== 基础配置 ====================
# 增量检查的基准分支
# - 设为 "" 或 "HEAD": 只检查未提交的变更（本地开发推荐）
# - 设为 "origin/master": 检查从 master 分叉后的所有变更（CI/PR 检查推荐）
base_branch: ""

# 是否启用增量检查（只检查 git 变更的代码）
incremental: true

# error 级别的违规是否导致编译失败
fail_on_error: true

# ==================== 文件过滤 ====================
# 包含的文件模式
included:
  - "**/*.m"
  - "**/*.mm"
  - "**/*.h"

# 排除的文件/目录模式
excluded:
  - "Pods/**"
  - "**/Vendor/**"
  - "**/ThirdParty/**"
  - "**/Generated/**"
  - "**/*Test*.m"
  - "**/*Tests.m"
  - "**/*Mock*.m"

# ==================== Python 规则配置 ====================
python_rules:
  # ---------- 命名规范 ----------
  class_prefix:
    enabled: false  # 默认关闭，需要配置前缀后启用
    severity: warning
    params:
      prefix: ""  # 设置类名前缀，如 "BL"

  property_naming:
    enabled: true
    severity: warning

  constant_naming:
    enabled: true
    severity: warning

  method_naming:
    enabled: true
    severity: warning

  enum_naming:
    enabled: false  # 默认关闭，需要配置前缀后启用
    severity: warning
    params:
      prefixes: []  # 设置枚举名前缀，如 ["BL", "GM"]

  protocol_naming:
    enabled: false  # 默认关闭，需要配置前缀后启用
    severity: warning
    params:
      prefixes: []  # 设置协议名前缀，如 ["BL", "GM"]

  method_parameter:
    enabled: true
    severity: warning
    params:
      max_params: 4  # 最大参数数量

  # ---------- 代码风格 ----------
  line_length:
    enabled: true
    severity: warning
    params:
      max_length: 120

  method_length:
    enabled: true
    severity: warning
    params:
      max_lines: 80

  todo_fixme:
    enabled: true
    severity: warning

  # ---------- 内存安全 ----------
  weak_delegate:
    enabled: true
    severity: error

  block_retain_cycle:
    enabled: true
    severity: warning

  wrapper_empty_pointer:
    enabled: true
    severity: warning

  dict_usage:
    enabled: true
    severity: warning

  collection_mutation:
    enabled: true
    severity: warning

  # ---------- 安全规则 ----------
  forbidden_api:
    enabled: false  # 默认关闭
    severity: error
    params:
      apis: []
      # 示例配置:
      # apis:
      #   - pattern: "NSLog\\s*\\("
      #     message: "请使用 BLLog 替代 NSLog"
      #   - pattern: "\\[NSUserDefaults standardUserDefaults\\]"
      #     message: "请使用 BLUserDefaults"

  hardcoded_credentials:
    enabled: true
    severity: error

  insecure_random:
    enabled: true
    severity: warning

  # ---------- 文件规范 ----------
  file_header:
    enabled: false  # 默认关闭，需要配置模板后启用
    severity: warning
    params:
      required_patterns: []
      # 示例配置:
      # required_patterns:
      #   - "Copyright"
      #   - "Created by"

# ==================== 自定义规则 ====================
custom_rules:
  # Python 自定义规则
  python:
    enabled: true
    path: "./custom_rules/python/"

# ==================== 统计上报配置 ====================
metrics:
  # 是否启用统计上报
  enabled: false
  # 上报服务地址
  endpoint: "http://127.0.0.1:18080"
  # 上报鉴权 Token（与服务端配置一致）
  token: ""
  # 项目标识（用于服务端聚合统计，留空则使用项目目录名）
  project_key: ""
  # 项目名称（留空则依次尝试: Xcode TARGET_NAME → 项目目录名）
  project_name: ""
  # 上报模式: push
  mode: "push"
  # 本地缓存目录（上报失败时落盘）
  spool_dir: "~/.biliobjclint/metrics_spool"
  # 请求超时时间（毫秒）
  timeout_ms: 2000
  # 失败重试次数
  retry_max: 3

# ==================== 本地 Pod 检测配置 ====================
local_pods:
  # 是否启用本地 Pod 检测
  enabled: true
  # 是否对本地 Pod 进行增量检测
  # - true: 只检查本地 Pod 的 git 变更（推荐）
  # - false: 全量检查本地 Pod 的所有文件
  incremental: true
  # 本地 Pod 的包含模式（空表示所有）
  included_pods: []
  # 本地 Pod 的排除模式
  excluded_pods:
    - "*Test*"
    - "*Mock*"

# ==================== 性能优化配置 ====================
performance:
  # 是否启用并行检查（多文件并行执行规则检查）
  parallel: true
  # 最大工作线程数
  # - 0: 自动（min(32, CPU核心数 * 2)）
  # - >0: 指定线程数
  max_workers: 0
  # 文件内容缓存最大容量（MB）
  file_cache_size_mb: 100
  # 是否启用规则结果缓存（持久化到磁盘，跨编译复用）
  # 注意：仅在全量模式下生效，增量模式不使用此缓存
  result_cache_enabled: true
